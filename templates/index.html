<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <h2>Basketball Scoreboard</h2>
    </header>
    <div class="container">
        <div>
            <h3>HOME</h3>
            <div class="blackbox1">
                <h1 id="home-pts" aria-live="polite">0</h1>
            </div>
            <div class="increaments">
                <button onclick="hplusOne()">+1</button>
                <button onclick="hplusTwo()">+2</button>
                <button onclick="hplusThree()">+3</button>
            </div>
        </div>

        <div>
            <h3>GUEST</h3>
            <div class="blackbox2">
                <h1 id="guest-pts" aria-live="polite">0</h1>
            </div>
            <div class="increaments">
                <button onclick="gplusOne()">+1</button>
                <button onclick="gplusTwo()">+2</button>
                <button onclick="gplusThree()">+3</button>
            </div>
        </div>
    </div>
    <div>
        <button id="new-game" onclick="newGame()">New Game</button>
        <button id="end-game" onclick="endgame()">End Game</button>
    </div>
    <div id="result" aria-live="polite" role="status" class="result-display"></div>

    <script src="index.js"></script>
</body>
</html>
